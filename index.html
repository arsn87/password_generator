<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Güvenli, hızlı ve modern şifre oluşturucu.">
    <meta name="theme-color" content="#000000">
    <title>Şifre Oluşturucu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="card">
        <h1>Şifre Oluşturucu</h1>

        <div class="password-field">
            <input type="text" id="passwordDisplay" readonly placeholder="Oluştur'a bas">
            <button id="copyBtn" class="icon-btn" aria-label="Kopyala" title="Kopyala">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
        </div>

        <div class="strength">
            <div class="strength-bar"><span id="strengthFill"></span></div>
            <span id="strengthLabel">—</span>
        </div>

        <div class="length-control">
            <label for="lengthSlider">Uzunluk</label>
            <input type="range" id="lengthSlider" min="12" max="64" value="16">
            <input type="number" id="lengthInput" min="12" max="64" value="16">
        </div>

        <div class="toggles">
            <label class="chip">
                <input type="checkbox" id="includeUppercase" checked>
                <span>A-Z</span>
            </label>
            <label class="chip">
                <input type="checkbox" id="includeNumbers" checked>
                <span>0-9</span>
            </label>
            <label class="chip">
                <input type="checkbox" id="includeSpecialChars" checked>
                <span>!@#</span>
            </label>
        </div>

        <div class="actions">
            <button id="generateBtn" class="primary">Oluştur</button>
            <button id="clearBtn" class="ghost">Temizle</button>
        </div>

        <div id="toast" class="toast" role="status" aria-live="polite">Kopyalandı</div>
    </main>

    <footer class="footer-text">© Taylan Aydın</footer>

    <script src="main.js"></script>
</body>
</html>
